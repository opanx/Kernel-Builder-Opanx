name: Build Kernel GKI - ReSukiSU + SUSFS (Gaming Edition)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: 1. Setup Environment & Install Clang 19
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl git zip unzip perl jq wget lsb-release software-properties-common gpg python3 python3-distutils

        # Download and install LLVM/Clang 19 officially
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 19 all || {
          echo "LLVM script failed, trying alternative method..."
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update
          sudo apt-get install -y clang-19 lld-19 llvm-19 llvm-19-dev llvm-19-tools
        }

        # [FIX] Link ALL LLVM tools to /usr/bin so make can detect them
        for bin in /usr/lib/llvm-19/bin/*; do
          sudo ln -sf "$bin" "/usr/bin/$(basename "$bin")"
        done

        # Export to global PATH for all subsequent steps
        echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH
        echo "LLVM_VERSION=19" >> $GITHUB_ENV
        
        # Verify clang installation
        clang --version
        ld.lld --version

    - name: 2. Clone Kernel Source (MillenniumOSS 5.10)
      run: |
        set -e
        git clone --depth=1 -b android12-5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git kernel-source
        cd kernel-source
        echo "Kernel source cloned successfully"
        git log -1 --oneline

    - name: 3. Inject ReSukiSU Core
      run: |
        set -e
        cd kernel-source
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main || {
          echo "ReSukiSU injection failed, trying manual method..."
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git temp_sukisu
          cp -rv temp_sukisu/KernelSU kernel-source/
          rm -rf temp_sukisu
        }
        echo "ReSukiSU injected successfully"

    - name: 4. Download & Apply SUSFS Patch (Kernel 5.10)
      run: |
        set -e
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs-source || {
          echo "Failed to clone SUSFS, trying alternative branch..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b main susfs-source
        }
        
        mkdir -p kernel-source/KernelSU/kernel
        cp -v susfs-source/KernelSU/kernel/ksu_susfs.h kernel-source/KernelSU/kernel/ || echo "ksu_susfs.h already exists or not found"
        cp -rv susfs-source/kernel_patches/fs/* kernel-source/fs/ || echo "FS patches already exist or not found"
        cp -rv susfs-source/kernel_patches/include/linux/* kernel-source/include/linux/ || echo "Include patches already exist or not found"
        cp -v susfs-source/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch kernel-source/ || {
          echo "Patch file not found, looking for alternative..."
          find susfs-source -name "*.patch" | head -1 | xargs -I {} cp -v {} kernel-source/susfs.patch
        }
        
        cd kernel-source
        
        # Get SUBLEVEL
        SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}' || echo "0")
        echo "Kernel SUBLEVEL: $SUBLEVEL"
        
        # Apply proc/base.c fix for SUBLEVEL <= 43
        if [ "$SUBLEVEL" -le "43" ] 2>/dev/null; then
          echo "Applying proc/base.c fix for SUBLEVEL <= 43"
          perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/' fs/proc/base.c || echo "proc/base.c fix skipped"
        fi
        
        # Apply fdinfo.c fixes for SUBLEVEL <= 117
        if [ "$SUBLEVEL" -le "117" ] 2>/dev/null; then
          echo "Applying fdinfo.c fixes for SUBLEVEL <= 117"
          sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c || echo "fdinfo.c fix 1 skipped"
          perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c || echo "fdinfo.c fix 2 skipped"
          perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c || echo "fdinfo.c fix 3 skipped"
        fi
        
        # Apply main SUSFS patch
        PATCH_FILE="50_add_susfs_in_gki-android12-5.10.patch"
        if [ ! -f "$PATCH_FILE" ]; then
          PATCH_FILE="susfs.patch"
        fi
        
        echo "Applying SUSFS patch: $PATCH_FILE..."
        patch -p1 < "$PATCH_FILE" || {
          echo "SUSFS patch failed, trying with different options..."
          patch -p1 --force < "$PATCH_FILE" || echo "SUSFS patch application failed but continuing..."
        }
        
        # Apply task_mmu.c fix for SUBLEVEL <= 209
        if [ "$SUBLEVEL" -le "209" ] 2>/dev/null; then
          echo "Applying task_mmu.c fix for SUBLEVEL <= 209"
          sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c || echo "task_mmu.c fix skipped"
        fi
        
        echo "SUSFS patch applied successfully"

    - name: 5. Inject Gaming Optimization "Geyming Abis"
      run: |
        set -e
        cd kernel-source
        echo "Applying -O3 optimization..."
        find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-O2/-O3/g' || true
        echo "Removing -Werror warnings as errors..."
        find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true
        sed -i 's/CONFIG_FRAME_WARN=2048/CONFIG_FRAME_WARN=4096/g' arch/arm64/configs/gki_defconfig || true
        
        # Add gaming optimizations safely
        cat >> arch/arm64/configs/gki_defconfig << 'EOF'

# Gaming optimizations
# CONFIG_DEBUG_INFO is not set
CONFIG_DEBUG_INFO_REDUCED=n
CONFIG_SLUB_DEBUG=n
CONFIG_PANIC_ON_OOPS=n
CONFIG_LOCKUP_DETECTOR=n
CONFIG_SCHED_DEBUG=n
CONFIG_PROFILING=y
CONFIG_PERF_EVENTS=y
CONFIG_HW_PERF_EVENTS=y
CONFIG_ARM_PMU=y
CONFIG_FRAME_WARN=4096
CONFIG_WERROR=n
CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
CONFIG_CRYPTO_LZ4=y
CONFIG_CRYPTO_LZ4HC=y
CONFIG_ZRAM_DEF_COMP_LZ4=y
EOF
        echo "Gaming optimizations applied"

    - name: 6. Compile Kernel GKI (Clang 19)
      run: |
        set -e
        cd kernel-source
        
        # Export compiler variables
        export PATH=/usr/lib/llvm-19/bin:$PATH
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export LLVM=1
        export LLVM_IAS=1

        # Add SUSFS and custom config
        cat >> arch/arm64/configs/gki_defconfig << 'EOF'

# SUSFS Configuration
CONFIG_KSU_SUSFS=y
CONFIG_KSU_SUSFS_SUS_PATH=y
CONFIG_KSU_SUSFS_SUS_MOUNT=y
CONFIG_KSU_SUSFS_SUS_KSTAT=y
CONFIG_KSU_SUSFS_SPOOF_UNAME=y
CONFIG_KSU_SUSFS_ENABLE_LOG=n
CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
CONFIG_KSU_SUSFS_SUS_MAP=y
CONFIG_LOCALVERSION="-Panxcz-susfs"
EOF

        echo "Configuring kernel..."
        make O=out ARCH=arm64 gki_defconfig
        make O=out ARCH=arm64 olddefconfig

        echo "Starting kernel compilation with $(nproc --all) threads..."
        make -j$(nproc --all) O=out ARCH=arm64 \
                              CC=clang \
                              LD=ld.lld \
                              AR=llvm-ar \
                              NM=llvm-nm \
                              OBJCOPY=llvm-objcopy \
                              OBJDUMP=llvm-objdump \
                              STRIP=llvm-strip \
                              CROSS_COMPILE=aarch64-linux-gnu- \
                              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                              LLVM=1 \
                              LLVM_IAS=1 || {
          echo "Compilation failed, checking logs..."
          tail -100 out/.config || true
          exit 1
        }

        echo "Kernel compilation completed!"
        ls -lh out/arch/arm64/boot/

    - name: 7. Pack into Anti-Bootloop .Zip (AnyKernel3)
      run: |
        set -e
        git clone --depth=1 https://github.com/OSM0SIS/AnyKernel3.git AK3
        if [ -f kernel-source/out/arch/arm64/boot/Image ]; then
          cp -v kernel-source/out/arch/arm64/boot/Image AK3/
        elif [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
          cp -v kernel-source/out/arch/arm64/boot/Image.gz-dtb AK3/Image
        else
          echo "Error: Kernel image not found!"
          ls -la kernel-source/out/arch/arm64/boot/ || true
          exit 1
        fi
        cd AK3
        sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=auto;|g' anykernel.sh
        sed -i 's|is_slot_device=0;|is_slot_device=auto;|g' anykernel.sh
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 ../Panxcz_kernel_susfs.zip *
        echo "Kernel zip created successfully!"

    - name: 8. Upload Kernel .Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Zip-Gaming-Flashable
        path: Panxcz_kernel_susfs.zip
        retention-days: 30
