name: Build Kernel GKI - ReSukiSU + SUSFS (Gaming Edition)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
    - name: 1. Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl git zip unzip perl jq wget
        # Gunakan LLVM 17 yang paling stabil buat 5.10
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 17 all
        echo "/usr/lib/llvm-17/bin" >> $GITHUB_PATH

    - name: 2. Clone Kernel & Patch
      run: |
        git clone --depth=1 -b android12-5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git kernel-source
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs-source
        cd kernel-source
        cp ../susfs-source/KernelSU/kernel/ksu_susfs.h KernelSU/kernel/
        cp -r ../susfs-source/kernel_patches/fs/* fs/
        cp -r ../susfs-source/kernel_patches/include/linux/* include/linux/
        patch -p1 < ../susfs-source/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch

    - name: 3. Compile Kernel
      run: |
        cd kernel-source
        export PATH=/usr/lib/llvm-17/bin:$PATH
        # Hapus -Werror biar warning kecil gak bikin build berhenti
        find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true
        
        # PENTING: Langsung ke gki_defconfig dan make inti. 
        # Skip headers_install karena ini sering jadi biang kerok timeout.
        make O=out ARCH=arm64 gki_defconfig
        
        # Kompilasi langsung!
        make -j$(nproc) O=out ARCH=arm64 \
          HOSTCC=gcc HOSTCXX=g++ \
          CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 LLVM_IAS=1

    - name: 4. Packing
      run: |
        git clone --depth=1 https://github.com/OSM0SIS/AnyKernel3.git AK3
        cp kernel-source/out/arch/arm64/boot/Image AK3/
        cd AK3
        echo 'block=auto;' >> anykernel.sh
        echo 'is_slot_device=auto;' >> anykernel.sh
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 ../Panxcz_kernel_susfs.zip *

    - name: 5. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Panxcz_kernel_susfs
        path: Panxcz_kernel_susfs.zip
