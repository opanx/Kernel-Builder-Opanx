name: Build Kernel GKI - Panxcz Gaming SUSFS

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Kompilasi Kernel GKI (Android 12 - 5.10.258)
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Persiapan Server & Pemasangan Clang 22
        run: |
          echo "=== MEMULAI SETUP ENVIRONMENT ==="
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl git zip unzip perl jq wget lsb-release software-properties-common gpg

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all

          LLVM_BIN_PATH="/usr/lib/llvm-22/bin"
          sudo ln -sf "$LLVM_BIN_PATH/clang" /usr/bin/clang
          sudo ln -sf "$LLVM_BIN_PATH/ld.lld" /usr/bin/ld.lld
          sudo ln -sf "$LLVM_BIN_PATH/llvm-objcopy" /usr/bin/llvm-objcopy
          sudo ln -sf "$LLVM_BIN_PATH/llvm-ar" /usr/bin/llvm-ar
          sudo ln -sf "$LLVM_BIN_PATH/llvm-strip" /usr/bin/llvm-strip
          sudo ln -sf "$LLVM_BIN_PATH/llvm-nm" /usr/bin/llvm-nm
          sudo ln -sf "$LLVM_BIN_PATH/llvm-objdump" /usr/bin/llvm-objdump
          sudo ln -sf "$LLVM_BIN_PATH/llvm-readelf" /usr/bin/llvm-readelf

          echo "$LLVM_BIN_PATH" >> $GITHUB_PATH
          echo "=== VERIFIKASI COMPILER ==="
          clang --version

      - name: 2. Kloning Source Kernel & Set Version 5.10.258 (branch millennium-base)
        run: |
          echo "=== CLONING KERNEL SOURCE ==="
          git clone --depth=1 -b millennium-base https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git kernel-source

          cd kernel-source
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 258/' Makefile
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -Panxcz-gaming/' Makefile
          echo "Versi kernel: $(make kernelversion 2>/dev/null || cat Makefile | grep -E '^VERSION|^PATCHLEVEL|^SUBLEVEL|^EXTRAVERSION' | tr '\n' ' ')"

      - name: 3. Suntik ReSukiSU Core
        run: |
          echo "=== MENYUNTIKKAN RESUKISU CORE ==="
          cd $GITHUB_WORKSPACE/kernel-source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: 4. Integrasi SUSFS v2.2.0 (patch wajib berhasil)
        run: |
          echo "=== INTEGRASI SUSFS v2.2.0 ==="
          cd $GITHUB_WORKSPACE

          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs-source

          HEADER_DEST="$GITHUB_WORKSPACE/kernel-source/KernelSU/kernel/ksu_susfs.h"
          mkdir -p "$(dirname "$HEADER_DEST")"

          if [ -f "$HEADER_DEST" ]; then
            echo "ksu_susfs.h sudah ada dari ReSukiSU."
          else
            echo "Mencari ksu_susfs.h dari susfs-source..."
            SUSFS_HEADER=$(find $GITHUB_WORKSPACE/susfs-source -name "ksu_susfs.h" | head -n 1)
            if [ -n "$SUSFS_HEADER" ]; then
              cp "$SUSFS_HEADER" "$HEADER_DEST"
              echo "Berhasil disalin!"
            else
              echo "Coba mirror via curl..."
              MIRRORS=(
                "https://raw.githubusercontent.com/5ec1cff/KernelSU-SUSFS/main/kernel/ksu_susfs.h"
                "https://raw.githubusercontent.com/sidrxt/KernelSU-SUSFS/main/kernel/ksu_susfs.h"
                "https://raw.githubusercontent.com/backslashxx/KernelSU-SUSFS/main/kernel/ksu_susfs.h"
              )
              DOWNLOAD_SUCCESS=0
              for url in "${MIRRORS[@]}"; do
                if curl -fsSL -o "$HEADER_DEST" "$url"; then
                  echo "Berhasil dari $url"
                  DOWNLOAD_SUCCESS=1
                  break
                else
                  echo "Gagal dari $url"
                fi
              done
              if [ $DOWNLOAD_SUCCESS -ne 1 ]; then
                echo "Gagal semua mirror, buat file kosong (risiko)."
                touch "$HEADER_DEST"
              fi
            fi
          fi

          echo "Menyalin patch & include..."
          cp -r $GITHUB_WORKSPACE/susfs-source/kernel_patches/fs/* $GITHUB_WORKSPACE/kernel-source/fs/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/susfs-source/kernel_patches/include/linux/* $GITHUB_WORKSPACE/kernel-source/include/linux/ 2>/dev/null || true
          find $GITHUB_WORKSPACE/susfs-source/kernel_patches -name "*.patch" -exec cp {} $GITHUB_WORKSPACE/kernel-source/ \;

          cd $GITHUB_WORKSPACE/kernel-source
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Sublevel: 5.10.$SUBLEVEL"

          if [ "$SUBLEVEL" -le "43" ]; then
            perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/;' fs/proc/base.c
          fi
          if [ "$SUBLEVEL" -le "117" ]; then
            sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
            perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
            perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
          fi

          PATCH_FILE=$(ls 50_*.patch 2>/dev/null | head -n 1)
          if [ -z "$PATCH_FILE" ]; then
            echo "Tidak ada patch SUSFS!" && exit 1
          fi
          echo "Menggunakan patch: $PATCH_FILE"
          patch -p1 < "$PATCH_FILE"
          if [ $? -ne 0 ]; then
            echo "Patch gagal! Cek reject file:"
            find . -name "*.rej" -exec cat {} \;
            exit 1
          fi

          if [ "$SUBLEVEL" -le "209" ]; then
            sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
          fi

      - name: 5. Konfigurasi Optimasi Gaming & Memory Core (hard fix Werror & config)
        run: |
          echo "=== SUNTIK OPTIMASI GAME & MEMORY ==="
          cd $GITHUB_WORKSPACE/kernel-source

          # 1. Hapus semua -Werror dan -Werror=... dari semua Makefile
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror\b//g; s/-Werror=[^ ]*//g; s/-Wstrict-prototypes//g' || true
          sed -i 's/-Werror\b//g; s/-Werror=[^ ]*//g; s/-Wstrict-prototypes//g' arch/arm64/Makefile || true
          sed -i 's/-Werror\b//g; s/-Werror=[^ ]*//g; s/-Wstrict-prototypes//g' scripts/Makefile.extrawarn || true

          # 2. Tambahkan flag -Wno-unknown-warning-option ke KBUILD_CFLAGS di Makefile
          echo 'KBUILD_CFLAGS += -Wno-unknown-warning-option -Wno-error' >> Makefile
          echo 'KBUILD_CFLAGS += -O3 -march=armv8.2-a+crypto' >> Makefile
          echo 'HOSTCFLAGS += -Wno-unknown-warning-option -Wno-error' >> Makefile

          # 3. Buat defconfig dulu
          make O=out ARCH=arm64 gki_defconfig

          # 4. Set semua opsi konfigurasi menggunakan scripts/config (biar presisi)
          cd out
          # Aktifkan gaming & memory
          ../scripts/config --enable CONFIG_HZ_1000 --set-val CONFIG_HZ 1000
          ../scripts/config --enable CONFIG_SCHED_AUTOGROUP
          ../scripts/config --enable CONFIG_CFS_BANDWIDTH
          ../scripts/config --enable CONFIG_RT_GROUP_SCHED
          ../scripts/config --enable CONFIG_ENERGY_MODEL
          ../scripts/config --enable CONFIG_CPU_FREQ_GOV_SCHEDUTIL
          ../scripts/config --enable CONFIG_CPU_FREQ_GOV_PERFORMANCE
          ../scripts/config --enable CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL
          ../scripts/config --enable CONFIG_CPU_IDLE_GOV_MENU
          ../scripts/config --enable CONFIG_CPU_IDLE_GOV_TEO
          ../scripts/config --set-val CONFIG_DEFAULT_MMAP_MIN_ADDR 32768
          ../scripts/config --enable CONFIG_COMPAT_VDSO
          ../scripts/config --enable CONFIG_THUMB2_COMPAT_VDSO
          ../scripts/config --enable CONFIG_ARM64_PTR_AUTH
          ../scripts/config --enable CONFIG_ARM64_BTI_KERNEL
          ../scripts/config --enable CONFIG_ARM64_TLB_RANGE
          ../scripts/config --enable CONFIG_ARM64_MTE
          ../scripts/config --disable CONFIG_SHADOW_CALL_STACK
          ../scripts/config --enable CONFIG_LLVM_POLLY
          ../scripts/config --enable CONFIG_INIT_STACK_NONE
          ../scripts/config --enable CONFIG_INIT_ON_ALLOC_DEFAULT_ON
          ../scripts/config --enable CONFIG_KASAN_GENERIC
          ../scripts/config --enable CONFIG_KASAN_OUTLINE
          ../scripts/config --enable CONFIG_KASAN_STACK
          # Nonaktifkan erratum yang gak perlu
          for err in 843419 845719 1024718 1418040 1165522 1286807 1463225 1542419 1508412 2054223 2067961 2077057 2081180 2139208 2441009 2457168 2645198; do
            ../scripts/config --disable CONFIG_ARM64_ERRATUM_$err
          done
          # Memory
          ../scripts/config --enable CONFIG_ZRAM
          ../scripts/config --set-val CONFIG_ZRAM_DEF_COMP lz4
          ../scripts/config --enable CONFIG_ZRAM_DEF_COMP_LZ4
          ../scripts/config --enable CONFIG_ZSMALLOC
          ../scripts/config --enable CONFIG_TRANSPARENT_HUGEPAGE
          ../scripts/config --enable CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS
          ../scripts/config --enable CONFIG_CLEANCACHE
          ../scripts/config --enable CONFIG_FRONTSWAP
          ../scripts/config --enable CONFIG_MEMORY_BALLOON
          ../scripts/config --enable CONFIG_BALLOON_COMPACTION
          ../scripts/config --enable CONFIG_COMPACTION
          ../scripts/config --enable CONFIG_MIGRATION
          ../scripts/config --enable CONFIG_KSM
          ../scripts/config --enable CONFIG_LZ4_COMPRESS
          ../scripts/config --enable CONFIG_LZ4_DECOMPRESS
          ../scripts/config --enable CONFIG_CRYPTO_LZ4
          ../scripts/config --enable CONFIG_CRYPTO_LZ4HC
          # Matikan debug & headers
          ../scripts/config --disable CONFIG_HEADERS_INSTALL
          ../scripts/config --disable CONFIG_LTO_NONE   # pilih none
          ../scripts/config --enable CONFIG_LTO_NONE
          ../scripts/config --enable CONFIG_RELR
          ../scripts/config --set-val CONFIG_ARCH_MMAP_RND_BITS 18
          ../scripts/config --set-val CONFIG_ARCH_MMAP_RND_COMPAT_BITS 11
          ../scripts/config --disable CONFIG_DEBUG_INFO
          ../scripts/config --disable CONFIG_SLUB_DEBUG
          ../scripts/config --disable CONFIG_PANIC_ON_OOPS
          ../scripts/config --disable CONFIG_LOCKUP_DETECTOR
          ../scripts/config --disable CONFIG_SCHED_DEBUG
          ../scripts/config --disable CONFIG_WERROR
          ../scripts/config --set-val CONFIG_FRAME_WARN 4096
          ../scripts/config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          # Tambahkan SUSFS
          ../scripts/config --enable CONFIG_KSU_SUSFS
          ../scripts/config --enable CONFIG_KSU_SUSFS_SUS_PATH
          ../scripts/config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ../scripts/config --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ../scripts/config --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ../scripts/config --disable CONFIG_KSU_SUSFS_ENABLE_LOG
          ../scripts/config --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ../scripts/config --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ../scripts/config --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ../scripts/config --enable CONFIG_KSU_SUSFS_SUS_MAP
          ../scripts/config --set-val CONFIG_LOCALVERSION "-Panxcz-susfs"
          cd ..

          # 5. Jalankan olddefconfig untuk fix dependency
          make O=out ARCH=arm64 olddefconfig

      - name: 6. Proses Kompilasi Kernel (Clang 22)
        run: |
          echo "=== MEMULAI KOMPILASI KERNEL ==="
          cd $GITHUB_WORKSPACE/kernel-source
          export PATH="/usr/lib/llvm-22/bin:$PATH"

          # Build Image dan modules
          make -j$(nproc --all) O=out ARCH=arm64 \
            HOSTCC=gcc HOSTCXX=g++ \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-unknown-warning-option -Wno-error" \
            HOSTCFLAGS="-Wno-unknown-warning-option -Wno-error" \
            Image modules

      - name: 7. Proses Packing AnyKernel3 (Hard Fix Slot A/B)
        run: |
          echo "=== PACKING ZIP INSTALASI ==="
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/OSM0SIS/AnyKernel3.git AK3

          if [ -f kernel-source/out/arch/arm64/boot/Image ]; then
            cp kernel-source/out/arch/arm64/boot/Image AK3/
            echo "Image berhasil disalin!"
          else
            echo "Image tidak ditemukan!" && exit 1
          fi

          cd AK3
          sed -i 's|block=.*|block=/dev/block/by-name/boot;|g' anykernel.sh
          sed -i 's|is_slot_device=.*|is_slot_device=auto;|g' anykernel.sh
          echo 'partition_list="boot_a boot_b boot dtbo_a dtbo_b";' >> anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh

          zip -r9 ../Panxcz_kernel_susfs.zip *

      - name: 8. Mengunggah Hasil Build Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Panxcz_kernel_susfs
          path: Panxcz_kernel_susfs.zip
